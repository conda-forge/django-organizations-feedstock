context:
  name: django-organizations
  version: "2.6.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  # NOTE: the source pypi archive is broken (no src/ folder in it)
  url: https://github.com/bennylope/django-organizations/archive/refs/tags/${{ version }}.zip
  sha256: 9280cf818be7b7a8b98c5881294c895e83d4775d6b50da9e47ae3ded6e59186d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - django >=3.2
    - django-extensions >=2.0.8

tests:
  - python:
      imports:
        - organizations
      python_version: ${{ python_min }}.*

about:
  license: BSD-2-Clause
  license_file: LICENSE
  summary: Multi-user accounts for Django projects
  homepage: https://github.com/bennylope/django-organizations

extra:
  recipe-maintainers:
    - hadim
